name = "devbox-api"
main = "src/index.ts"
compatibility_date = "2025-09-06"

# Workers Logs — 保留近期呼叫的 console 記錄,供事後查 /api/stats 偶發 5xx 等。
[observability]
enabled = true
head_sampling_rate = 1

# D1 — 短網址儲存。部署前用 `wrangler d1 create devbox` 取得 database_id 後填入。
[[d1_databases]]
binding = "DB"
database_name = "devbox"
database_id = "fe0a2a4d-e1f5-4365-b9ac-90774d68dfe1"

# Analytics Engine — 點擊事件指標。
[[analytics_engine_datasets]]
binding = "CLICKS"
dataset = "devbox_clicks"

# 必要 secret(勿寫在此檔,用指令設定):
#   wrangler secret put CREATE_TOKEN   # 建立短網址的 bearer token
#   wrangler secret put AE_API_TOKEN   # 查 Analytics Engine SQL API(需 Account Analytics Read)
#   wrangler secret put CF_ACCOUNT_ID  # Cloudflare account id(查 AE SQL API 用)
#   wrangler secret put VISIT_SALT     # 訪客 IP 雜湊 salt(隨機字串)
