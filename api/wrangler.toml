name = "devbox-api"
main = "src/index.ts"
compatibility_date = "2025-09-06"

# D1 — 短網址儲存。部署前用 `wrangler d1 create devbox` 取得 database_id 後填入。
[[d1_databases]]
binding = "DB"
database_name = "devbox"
database_id = "fe0a2a4d-e1f5-4365-b9ac-90774d68dfe1"

# Analytics Engine — 點擊事件指標。
[[analytics_engine_datasets]]
binding = "CLICKS"
dataset = "devbox_clicks"

# 必要 secret(勿寫在此檔,用指令設定):
#   wrangler secret put CREATE_TOKEN   # 建立短網址的 bearer token
