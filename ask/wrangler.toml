name = "devbox-ask"
main = "src/index.ts"
compatibility_date = "2025-09-06"

# Workers Logs — 保留近期呼叫的 console 記錄,供事後查問答/SSE 問題。
[observability]
enabled = true
head_sampling_rate = 1

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "resume"

[[kv_namespaces]]
binding = "ASK_KV"
id = "53c0380e24f649b9ac940f3d1bd29eac"

# 問答記錄(D1):每次問答存 question/answer/country/lang/ts(不存 IP)。
# 沿用 devbox D1,新建 ask_log 表。ADMIN_KEY(secret)保護 /admin 查看頁。
[[d1_databases]]
binding = "DB"
database_name = "devbox"
database_id = "fe0a2a4d-e1f5-4365-b9ac-90774d68dfe1"

# 速率護欄(原生 Rate Limiting,原子):per-IP 6/分、全域 40/分。
[[ratelimits]]
name = "RL_ASK_IP"
namespace_id = "1001"
simple = { limit = 6, period = 60 }

[[ratelimits]]
name = "RL_ASK_GLOBAL"
namespace_id = "1002"
simple = { limit = 40, period = 60 }
